name: 'Setup Node and Restore Cache'
description: 'Install pnpm, setup Node.js, and restore node_modules cache'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '24'
  pnpm-version:
    description: 'pnpm version to use'
    required: false
    default: '10.28.0'
  cache-key:
    description: 'Cache key for node_modules'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Restore node_modules
      id: cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: node_modules
        key: ${{ inputs.cache-key }}

    - name: Install dependencies (cache miss fallback)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "::warning::node_modules cache miss for '${{ inputs.cache-key }}' — installing from lockfile"
        pnpm install --frozen-lockfile

    - name: Verify node_modules
      shell: bash
      run: |
        if [ ! -d "node_modules" ] || [ ! -f "node_modules/.pnpm/lock.yaml" ]; then
          echo "::error::node_modules missing or incomplete after restore/install"
          exit 1
        fi
