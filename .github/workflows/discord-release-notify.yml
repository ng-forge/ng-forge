name: Discord Release Notification

on:
  # release.yml dispatches this workflow at the end of a successful publish — see its
  # "Notify Discord" step. We used to also listen for `release: published`, but App-
  # token-created releases never propagated that event to this workflow, so the
  # listener was dead weight and removed.
  workflow_run:
    # Fires whenever release.yml finishes; the notify-failure job below filters to failures.
    # Runs from main's copy of this file (workflow_run always uses the default branch),
    # so changes here only take effect after merge.
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to post (e.g. v0.8.0 or next/0.8.1-next.5). Fired automatically by release.yml on successful publish; can also be invoked manually to re-post.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  notify:
    name: Post release to Discord
    # Only fires from workflow_dispatch — release.yml dispatches us here after a
    # successful publish. workflow_run firings are handled by notify-failure below.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Build payload and post to Discord
        # Goes through `gh release view` (not raw event fields) so the embed renders
        # release notes consistently regardless of how the workflow was fired, and
        # dodges interpolation issues with bodies containing backticks or YAML-
        # significant chars.
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi

          META=$(gh release view "${TAG}" --json name,tagName,body,isPrerelease,isDraft,url)

          if [ "$(echo "$META" | jq -r '.isDraft')" = "true" ]; then
            echo "::warning::Release ${TAG} is a draft — skipping Discord notification"
            exit 0
          fi

          RELEASE_NAME=$(echo "$META" | jq -r '.name // .tagName')
          RELEASE_URL=$(echo "$META" | jq -r '.url')
          IS_PRERELEASE=$(echo "$META" | jq -r '.isPrerelease')
          BODY=$(echo "$META" | jq -r '.body // empty')
          BODY="${BODY:-_No release notes provided._}"

          # Discord embed description max is 4096 chars; trim with a notice if longer.
          MAX=3900
          if [ "${#BODY}" -gt "$MAX" ]; then
            BODY="${BODY:0:$MAX}"$'\n\n'"… *truncated — see [full release notes](${RELEASE_URL}).*"
          fi

          # jq builds the JSON so any markdown / quotes / newlines in the body are escaped correctly.
          if [ "$IS_PRERELEASE" = "true" ]; then
            PAYLOAD=$(jq -n \
              --arg title "🌙 ${RELEASE_NAME}" \
              --arg url "$RELEASE_URL" \
              --arg description "$BODY" \
              '{
                embeds: [{
                  title: $title,
                  url: $url,
                  description: $description,
                  color: 15844367,
                  fields: [{
                    name: "Install",
                    value: "```bash\npnpm add @ng-forge/dynamic-forms@next\n```"
                  }],
                  timestamp: now | todateiso8601
                }]
              }')
          else
            PAYLOAD=$(jq -n \
              --arg title "$RELEASE_NAME" \
              --arg url "$RELEASE_URL" \
              --arg description "$BODY" \
              '{
                embeds: [{
                  title: $title,
                  url: $url,
                  description: $description,
                  color: 3066993,
                  timestamp: now | todateiso8601
                }]
              }')
          fi

          # --fail makes curl exit non-zero on any 4xx/5xx so the step actually fails on bad webhook responses.
          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"

  notify-failure:
    name: Post release-workflow failure to Discord
    # Catches the "nightly silently failed for N days" class of incident: a run that
    # broke late (e.g. token-step misconfig) ships to npm but skips tag-write, so the
    # gate keeps re-publishing every night. Without an alert, all 8 prior failures sat
    # in the Actions tab unread for a week. Fires on any release.yml failure regardless
    # of trigger — schedule, workflow_dispatch, push — so manual dispatches get the
    # ping too.
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Post failure to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_EVENT: ${{ github.event.workflow_run.event }}
          RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_TITLE: ${{ github.event.workflow_run.display_title }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi

          PAYLOAD=$(jq -n \
            --arg url "$RUN_URL" \
            --arg event "$RUN_EVENT" \
            --arg branch "$RUN_BRANCH" \
            --arg sha "${RUN_SHA:0:7}" \
            --arg title "$RUN_TITLE" \
            '{
              embeds: [{
                title: "❌ Release workflow failed",
                url: $url,
                description: ($title + "\n\nTrigger: `" + $event + "` on `" + $branch + "` (`" + $sha + "`)\n\n[Open run](" + $url + ")"),
                color: 15158332,
                timestamp: now | todateiso8601
              }]
            }')

          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
