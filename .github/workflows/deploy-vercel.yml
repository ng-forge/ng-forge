name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

permissions:
  contents: read

concurrency:
  group: 'vercel-deploy'
  cancel-in-progress: false

jobs:
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ci-success: ${{ steps.check.outputs.success }}
    steps:
      - name: Check latest CI run
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            // Get the branch that triggered this workflow
            const branch = context.ref.replace('refs/heads/', '');
            console.log(`Checking CI status for branch: ${branch}`);

            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: branch,
              status: 'completed',
              per_page: 1
            });

            if (runs.total_count === 0) {
              core.setFailed(`No CI runs found for branch: ${branch}`);
              return;
            }

            const latestRun = runs.workflow_runs[0];
            console.log(`Latest CI run on ${branch}: ${latestRun.conclusion} (${latestRun.html_url})`);

            if (latestRun.conclusion === 'success') {
              core.setOutput('success', 'true');
            } else {
              core.setFailed(`Latest CI run failed on ${branch}: ${latestRun.html_url}`);
            }

  deploy:
    needs: check-ci
    uses: ./.github/workflows/_vercel-deploy.yml
    with:
      gh-environment: ${{ inputs.environment }}
      vercel-environment: ${{ inputs.environment }}
      production: ${{ inputs.environment == 'production' }}
      # production smoke-tests the public domain; preview falls back to the deploy URL
      smoke-url: ${{ inputs.environment == 'production' && 'https://ng-forge.com/dynamic-forms/' || '' }}
    secrets: inherit
