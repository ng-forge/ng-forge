name: CI

on:
  push:
    branches: [main, develop, 'release-*']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Don't cancel superseded runs on release-* branches: release.yml's check-ci
  # looks up the latest completed CI run by branch, and a cancelled run would
  # fail that gate.
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/heads/release-') }}

jobs:
  build-test:
    name: Build & Test
    uses: ./.github/workflows/_build-test.yml
    with:
      affected: false
    secrets: inherit

  ci-success:
    name: CI Complete
    if: always()
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all jobs succeeded
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
