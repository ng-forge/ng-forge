name: Deploy to Staging

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: 'vercel-staging'
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/_vercel-deploy.yml
    with:
      gh-environment: staging
      gh-environment-url: https://staging.ng-forge.com
      vercel-environment: preview
      production: false
      ref: ${{ github.event.workflow_run.head_sha }}
      alias: staging.ng-forge.com
      smoke-url: https://staging.ng-forge.com/dynamic-forms/
    secrets: inherit
