name: PR Check

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Release branches are versioned/published by release.yml; skip PR checks for them.
  should-run:
    name: Check if should run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-skip: ${{ steps.check.outputs.should-skip }}
    steps:
      - name: Check if release branch
        id: check
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == release-* ]]; then
            echo "should-skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping PR check for release branch: $HEAD_REF"
          else
            echo "should-skip=false" >> "$GITHUB_OUTPUT"
          fi

  build-test:
    name: Build & Test
    needs: should-run
    if: needs.should-run.outputs.should-skip != 'true'
    uses: ./.github/workflows/_build-test.yml
    with:
      affected: true
    secrets: inherit

  ci-success:
    name: PR Check Complete
    if: always()
    needs: [should-run, build-test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all jobs succeeded
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          # build-test is skipped for release branches (see should-run)
          allowed-skips: build-test
          jobs: ${{ toJSON(needs) }}
