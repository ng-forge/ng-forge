name: Release

# Single-workflow release pipeline. All publishes — stable (latest) and nightly (@next) —
# happen from THIS file. This is required by npm Trusted Publisher, which verifies the
# OIDC token's outermost workflow_ref claim against a single registered entry per package.
# Reusable workflows don't help here: the attestation only records the calling workflow's
# path, so a called workflow can never be the TP even if it does the actual publishing.

on:
  push:
    branches: ['release-*']
  workflow_dispatch:
    inputs:
      mode:
        description: 'Release mode'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run # stable path, no npm publish (dry-run only)
          - publish # stable path, real publish to @latest + tag + GH release
          - next # manual invocation of the @next path — same code as the scheduled run
  schedule:
    - cron: '27 1 * * *' # 01:27 UTC daily (~04:27 EEST) — after the late-night commit window, off the hour to avoid GH Actions cron stampede

permissions:
  contents: write
  id-token: write
  actions: read

# Serialize @next runs against @next runs, stable against stable — but allow @next and
# stable to run in parallel (they publish different versions and different tag names,
# so they don't collide). Prevents the "two @next dispatches compute the same counter,
# race the npm publish, second gets a 409" case.
concurrency:
  group: release-${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'next')) && 'next' || 'stable' }}
  cancel-in-progress: false

env:
  LIBRARY_PACKAGES: 'dynamic-forms dynamic-forms-material dynamic-forms-bootstrap dynamic-forms-ionic dynamic-forms-primeng dynamic-form-mcp openapi-generator'

jobs:
  # Push to release-* branches just surfaces this workflow in the PR checks — the actual
  # stable release is triggered manually via "Run workflow" after the PR is merged.
  await-dispatch:
    name: Awaiting manual trigger
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: |
          echo "ℹ️ Release workflow is ready."
          echo "To release, go to Actions → Release → Run workflow on this branch."
          echo "Select 'publish' mode to publish to npm."

  check-ci:
    name: Verify CI Passed
    # Only gates the stable dispatch paths. mode=next skips CI check — the @next gate
    # in the next-gate job doesn't need it, and scheduled runs don't hit this job at all.
    if: github.event_name == 'workflow_dispatch' && inputs.mode != 'next'
    runs-on: ubuntu-latest
    steps:
      - name: Check CI workflow status
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');

            console.log(`Checking CI status for branch: ${branch}`);

            // Get the latest CI workflow run for this branch
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'ci.yml',
              branch,
              per_page: 1
            });

            if (runs.data.workflow_runs.length === 0) {
              core.setFailed(`No CI workflow runs found for branch ${branch}. Push to the branch first to trigger CI.`);
              return;
            }

            const latestRun = runs.data.workflow_runs[0];
            console.log(`Latest CI run: ${latestRun.html_url}`);
            console.log(`Status: ${latestRun.status}, Conclusion: ${latestRun.conclusion}`);

            if (latestRun.status !== 'completed') {
              core.setFailed(`CI is still running. Wait for it to complete before releasing.`);
              return;
            }

            if (latestRun.conclusion !== 'success') {
              core.setFailed(`CI failed with conclusion: ${latestRun.conclusion}. Fix CI before releasing.`);
              return;
            }

            // Verify the CI run is for the same commit
            const currentSha = context.sha;
            if (latestRun.head_sha !== currentSha) {
              console.log(`Warning: CI ran on ${latestRun.head_sha}, current is ${currentSha}`);
              core.setFailed(`CI was run on a different commit. Push your changes and wait for CI to pass.`);
              return;
            }

            console.log('✅ CI passed for the current commit!');

  next-gate:
    name: Check for relevant changes (next)
    # Fires on scheduled cron OR on a manual `mode=next` dispatch (useful for on-demand
    # @next publishes without waiting for cron — e.g. to unblock a user or smoke-test).
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'next')
    runs-on: ubuntu-latest
    outputs:
      # Job output is the AND of "relevant commits exist" (gate) and "CI is green on
      # that commit" (ci-check). Either failing means we skip the @next publish.
      should_publish: ${{ steps.gate.outputs.should_publish == 'true' && steps.ci-check.outputs.ok != 'false' }}
      version: ${{ steps.gate.outputs.version }}
      sha: ${{ steps.gate.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Detect relevant changes & compute version
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' --exclude '*next*' --exclude '*nightly*' 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "::warning::No prior stable tag found — skipping next release"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Last stable tag: $LAST_TAG"

          # Bump-worthy commit types per nx.json release.conventionalCommits:
          # feat, fix, perf, revert. Everything else (docs/ci/chore/test/build/style/refactor)
          # is classified semverBump:none and should not trigger a next release.
          # Disable pipefail for this pipeline so we can distinguish grep's "no matches"
          # (exit 1, fine) from a real grep error (exit ≥2, fail loud).
          set +o pipefail
          RELEVANT=$(git log "${LAST_TAG}..HEAD" --pretty=format:'%s' \
            | grep -cE '^(feat|fix|perf|revert)(\([^)]+\))?!?: ')
          GREP_EXIT=$?
          set -o pipefail
          if [ "$GREP_EXIT" -gt 1 ]; then
            echo "::error::grep failed unexpectedly (exit $GREP_EXIT)"
            exit 1
          fi

          echo "Relevant commits since $LAST_TAG: $RELEVANT"

          if [ "$RELEVANT" -eq 0 ]; then
            echo "No version-bumping commits since last stable — skipping next release"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Capture the SHA NOW so the release job uses the same commit — no race
          # against in-flight commits between gate and release. (The counter-based
          # version doesn't embed the SHA, so pinning the ref is our only defense.)
          FULL_SHA=$(git rev-parse HEAD)

          # Idempotency: if this commit was already published as @next (see the
          # post-publish "Tag the @next publish" step in the release job), skip.
          # Cheap, git-native — no API calls. Tag-after-publish ordering means the
          # worst case on failure is one duplicate publish (not a phantom tag that
          # blocks forever).
          # Fail loud if the fetch itself errors — a silent failure here would make
          # us miss a recent `next/` tag and double-publish the same commit.
          git fetch --tags origin --quiet
          EXISTING_TAG=$(git tag --points-at "$FULL_SHA" | { grep '^next/' || true; } | head -1)
          if [ -n "$EXISTING_TAG" ]; then
            echo "::notice::$FULL_SHA already published as $EXISTING_TAG — skipping"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_VERSION=${LAST_TAG#v}
          # Bump minor: @next always signals "the upcoming minor release", regardless
          # of whether the next stable ends up being a patch or a minor. This keeps
          # versions like 0.8.0-next.1, 0.8.0-next.2, … stable across a release cycle.
          # When the real 0.8.0 (or 0.9.0) ships, the base rolls forward and the
          # counter resets.
          NEXT_MINOR=$(node -e "const [M,m,p]='${LAST_VERSION}'.split('.').map(Number); console.log(\`\${M}.\${m+1}.0\`)")

          # Monotonic counter per base version: 0.8.0-next.1, 0.8.0-next.2, ...
          # Query *every* library package and take the max — if one package failed
          # to publish on a prior run the others advanced, and we must not collide
          # with the highest existing counter anywhere. Commit traceability is still
          # recoverable via the publish timestamp + the npm provenance attestation
          # (records exact SHA).
          # We MUST succeed at every package lookup — fail loud rather than default
          # to counter=1, which could clobber a real previous publish on a transient error.
          MAX_COUNTER=0
          for pkg in ${{ env.LIBRARY_PACKAGES }}; do
            if ! VERSIONS_JSON=$(npm view "@ng-forge/${pkg}" versions --json); then
              echo "::error::npm registry lookup failed for @ng-forge/${pkg}"
              exit 1
            fi
            # Regex-escape the base via env var inside Node — avoids leaving
            # literal dots as wildcards in the pattern (0x8x0 would otherwise match).
            PKG_MAX=$(echo "$VERSIONS_JSON" \
              | NEXT_MINOR="$NEXT_MINOR" node -e "
                const v=JSON.parse(require('fs').readFileSync(0,'utf8'));
                const base=process.env.NEXT_MINOR.replace(/\\./g, '\\\\.');
                const re=new RegExp('^'+base+'-next\\\\.(\\\\d+)\$');
                const nums=(Array.isArray(v)?v:[v]).map(x=>{const m=re.exec(x);return m?+m[1]:-1}).filter(n=>n>=0);
                console.log(nums.length?Math.max(...nums):0);
              ")
            if [ "$PKG_MAX" -gt "$MAX_COUNTER" ]; then
              MAX_COUNTER=$PKG_MAX
            fi
          done
          COUNTER=$((MAX_COUNTER + 1))
          NEXT_VERSION="${NEXT_MINOR}-next.${COUNTER}"

          echo "Proposed next version: $NEXT_VERSION"

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${FULL_SHA}" >> "$GITHUB_OUTPUT"

      - name: Verify CI passed on the candidate commit
        # Skip @next publishes when main's CI is red. The stable path already has this
        # via the check-ci job; mirroring it here prevents a scheduled cron from
        # smoke-testing broken code under the @next dist-tag.
        # Sets ci-check.outputs.ok to 'false' on miss; the job's should_publish output
        # ANDs that in. Uses `core.warning` (not setFailed) so the STEP succeeds and
        # the output is actually emitted.
        if: steps.gate.outputs.should_publish == 'true'
        id: ci-check
        uses: actions/github-script@v9
        with:
          script: |
            // Fail-safe default: if anything below throws before we explicitly flip this
            // to 'true', the job's should_publish output ANDs in 'false' and we skip.
            // Without this, an unhandled exception (API outage, schema change) leaves
            // `ok` unset — and `undefined != 'false'` evaluates TRUE, publishing despite
            // a failed CI check.
            core.setOutput('ok', 'false');
            const sha = '${{ steps.gate.outputs.sha }}';
            const { owner, repo } = context.repo;
            const runs = await github.rest.actions.listWorkflowRuns({
              owner, repo, workflow_id: 'ci.yml', head_sha: sha, per_page: 1
            });
            const run = runs.data.workflow_runs[0];
            if (!run) {
              core.warning(`No CI run found for ${sha} — skipping @next publish`);
              return;
            }
            if (run.status !== 'completed') {
              core.warning(`CI for ${sha} still ${run.status} — skipping @next publish`);
              return;
            }
            if (run.conclusion !== 'success') {
              core.warning(`CI for ${sha} concluded ${run.conclusion} — skipping @next publish`);
              return;
            }
            console.log(`✅ CI for ${sha} passed — proceeding with @next publish`);
            core.setOutput('ok', 'true');

  release:
    name: Release Libraries
    runs-on: ubuntu-latest
    needs: [check-ci, next-gate]
    # `always()` is load-bearing: one of check-ci / next-gate is always skipped per run
    # (they gate on mutually exclusive conditions). Without `always()`, `needs:` would
    # short-circuit whenever either isn't successful.
    # Gating:
    #   - push             → never runs (release-* placeholder only)
    #   - dispatch+publish → check-ci must pass (mode=dry-run also hits this branch)
    #   - dispatch+dry-run → check-ci must pass
    #   - dispatch+next    → next-gate must decide to publish
    #   - schedule         → next-gate must decide to publish
    if: |
      always() &&
      github.event_name != 'push' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.mode != 'next' && needs.check-ci.result == 'success') ||
        ((github.event_name == 'schedule' || inputs.mode == 'next') && needs.next-gate.outputs.should_publish == 'true')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Pin to an immutable SHA so a commit landing between gate/check-ci and release
          # can't be silently published:
          #   - @next path: gate's captured SHA (main tip at gate time)
          #   - stable dispatch: github.sha (the workflow event's immutable commit)
          # Do NOT fall back to github.ref — it resolves to the branch TIP at checkout
          # time, which races in-flight commits and could publish unvalidated code.
          ref: ${{ needs.next-gate.outputs.sha || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version + dist-tag
        id: resolve
        env:
          GATE_VERSION: ${{ needs.next-gate.outputs.version }}
          # Single source of truth for "are we on the @next path?"
          IS_NEXT_PATH: ${{ github.event_name == 'schedule' || inputs.mode == 'next' }}
        run: |
          if [ "$IS_NEXT_PATH" = "true" ]; then
            VERSION="$GATE_VERSION"
            DIST_TAG="next"
          else
            # Stable dispatch (dry-run or publish): sources were already bumped by /release PR.
            VERSION=$(node -p "require('./packages/dynamic-forms/package.json').version")
            DIST_TAG="latest"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "DIST_TAG=$DIST_TAG" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Releasing $VERSION (dist-tag: $DIST_TAG)"

      - name: Build libraries
        # Build BEFORE bumping. Some packages (e.g. openapi-generator) declare
        # `manifestRootsToUpdate: ['{projectRoot}', 'dist/{projectRoot}']`, so
        # `nx release version` below needs `dist/.../package.json` to exist first.
        # For stable dispatch this builds the source already-bumped by /release.
        # For the @next path this builds unbumped sources; the next step rewrites both
        # source and dist package.jsons to the @next version.
        # Assumes the build doesn't embed `package.json`'s `version` string into emitted
        # JS (true for ng-packagr: version is only set on the dist manifest, not in code).
        # If any source ever starts doing `import pkg from './package.json'` and exposes
        # `pkg.version`, the dist would carry the unbumped value and the order needs to flip.
        run: pnpm nx run-many -t build -p ${{ env.LIBRARY_PACKAGES }}

      - name: Verify build outputs
        run: |
          echo "Verifying build outputs..."
          for pkg in ${{ env.LIBRARY_PACKAGES }}; do
            if [ ! -d "dist/packages/$pkg" ]; then
              echo "❌ Build output missing for $pkg"
              exit 1
            fi
            echo "✅ $pkg"
          done

      - name: Bump source + dist versions (@next path)
        if: github.event_name == 'schedule' || inputs.mode == 'next'
        # Two ephemeral mutations to nx.json (the runner discards its checkout
        # after the job, so on-disk nx.json is never affected):
        #   1. Strip preVersionCommand — `nx release version` would otherwise
        #      rebuild; we already built above.
        #   2. Disable preserveMatchingDependencyRanges — it defaults to true,
        #      which makes nx bail when the new version (e.g. prerelease
        #      `0.8.0-next.X`) sits outside the existing peer-dep range
        #      (`~0.7.0`). Disabling it lets nx rewrite the range to point at
        #      the @next version, which is what we want for cross-package
        #      installs of `@next`.
        env:
          NEW_VERSION: ${{ needs.next-gate.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('nx.json', 'utf8'));
            cfg.release ??= {};
            cfg.release.version ??= {};
            delete cfg.release.version.preVersionCommand;
            cfg.release.version.preserveMatchingDependencyRanges = false;
            fs.writeFileSync('nx.json', JSON.stringify(cfg, null, 2));
          "
          pnpm nx release version "$NEW_VERSION" \
            --git-commit=false --git-tag=false --stage-changes=false

      - name: Generate Changelog
        if: inputs.mode == 'publish'
        # Changelog lives in a local file; writing it has no side effect outside the
        # runner, so ordering before publish is fine. Earlier placement also means
        # `RELEASE_NOTES.md` is ready when the GitHub Release step runs below.
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' --exclude '*next*' --exclude '*nightly*' 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -50)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          cat > RELEASE_NOTES.md <<EOF
          ## What's Changed

          ${CHANGELOG}

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-initial}...v${{ env.VERSION }}
          EOF

      - name: Publish to npm (dry-run)
        if: inputs.mode == 'dry-run'
        run: pnpm nx release publish --access public --dry-run

      - name: Publish to npm
        # Real publish: workflow_dispatch mode=publish, workflow_dispatch mode=next, or schedule.
        # Runs BEFORE git tag + GitHub release on the stable path (and @next tag below) so
        # that the irreversible-first-so-reversible-second pattern holds: if npm fails, no
        # stale tag/release is left behind. On re-run after a partial failure, the
        # per-package `npm view` check below skips packages already on npm so we don't 409.
        # Node 22 ships with npm ≥ 10.9, which natively supports OIDC Trusted Publisher
        # + provenance — no pre-publish `npm install -g npm@latest` self-upgrade needed
        # (that step is also flaky because npm can corrupt its own node_modules mid-upgrade).
        if: |
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && (inputs.mode == 'publish' || inputs.mode == 'next'))
        run: |
          echo "Publishing with dist-tag: $DIST_TAG"
          for pkg in ${{ env.LIBRARY_PACKAGES }}; do
            # Idempotency: skip if this exact version is already on npm (previous run
            # may have published some packages before dying mid-loop).
            if npm view "@ng-forge/${pkg}@${VERSION}" version >/dev/null 2>&1; then
              echo "@ng-forge/${pkg}@${VERSION} already published — skipping"
              continue
            fi
            npm publish "dist/packages/$pkg" --access public --provenance --tag "$DIST_TAG"
          done

      - name: Configure Git
        # Git identity for the tag-creation steps below (stable and @next paths).
        if: inputs.mode == 'publish' || github.event_name == 'schedule' || inputs.mode == 'next'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Create Git Tag (stable)
        # Runs AFTER npm publish so a failed publish doesn't leave a stale v* tag.
        # If the tag step itself fails after a successful publish, re-running
        # succeeds because the idempotency check in Publish skips the already-pushed
        # packages. Manual recovery: re-dispatch mode=publish.
        if: inputs.mode == 'publish'
        run: |
          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag v${{ env.VERSION }} already exists (likely from a retry after partial failure) — skipping create"
          else
            git tag -a "v${{ env.VERSION }}" -m "Release v${{ env.VERSION }}"
            git push origin "v${{ env.VERSION }}"
          fi

      - name: Create GitHub Release
        if: inputs.mode == 'publish'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag the @next publish
        # Idempotency marker: next-gate checks for tags under `next/` pointing at HEAD
        # and skips if found, so re-runs on the same commit become no-ops.
        # Tag-after-publish (not before): if the tag push fails, worst case is one
        # duplicate publish on the next run — strictly better than the tag-first
        # failure mode where a phantom tag could permanently block future publishes.
        # continue-on-error makes the job succeed even if the tag push fails.
        if: github.event_name == 'schedule' || inputs.mode == 'next'
        continue-on-error: true
        env:
          NEXT_SHA: ${{ needs.next-gate.outputs.sha }}
        run: |
          git tag -a "next/${VERSION}" -m "Published @next ${VERSION}" "${NEXT_SHA}"
          git push origin "next/${VERSION}"

      - name: Summary
        run: |
          {
            echo "## Release v${{ env.VERSION }}"
            echo ""
            echo "### Published packages (dist-tag: \`$DIST_TAG\`):"
            for pkg in ${{ env.LIBRARY_PACKAGES }}; do
              echo "- \`@ng-forge/$pkg@${{ env.VERSION }}\`"
            done
            echo ""
            if [ "${{ inputs.mode }}" = "publish" ]; then
              echo "### Links:"
              echo "- [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/v${{ env.VERSION }})"
              echo "- [npm](https://www.npmjs.com/package/@ng-forge/dynamic-forms/v/${{ env.VERSION }})"
            else
              echo "### npm"
              echo "- [npm](https://www.npmjs.com/package/@ng-forge/dynamic-forms/v/${{ env.VERSION }})"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
