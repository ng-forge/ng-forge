name: Release

# Single-workflow release pipeline. All publishes — stable (latest) and nightly (@next) —
# happen from THIS file. This is required by npm Trusted Publisher, which verifies the
# OIDC token's outermost workflow_ref claim against a single registered entry per package.
# Reusable workflows don't help here: the attestation only records the calling workflow's
# path, so a called workflow can never be the TP even if it does the actual publishing.

on:
  push:
    branches: ['release-*']
  workflow_dispatch:
    inputs:
      mode:
        description: 'Release mode'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run # stable path, no npm publish (dry-run only)
          - publish # stable path, real publish to @latest + tag + GH release
          - next # manual invocation of the @next path — same code as the scheduled run
      target:
        # Starts (or re-targets) an rc cycle as a prerelease CHANNEL off main — no release
        # branch. One dispatch with mode=next + target=1.0.0 publishes 1.0.0-rc.1 to @rc;
        # every nightly after that auto-continues (rc.2, rc.3, …) by detecting the rc tag,
        # with no input needed. The cycle closes when the stable v1.0.0 ships. Ignored
        # unless mode=next; leave empty for ordinary @next nightlies.
        description: 'rc target version, e.g. 1.0.0 (mode=next only; leave empty for normal nightlies)'
        required: false
        type: string
        default: ''
  schedule:
    - cron: '27 1 * * *' # 01:27 UTC daily (~04:27 EEST) — after the late-night commit window, off the hour to avoid GH Actions cron stampede

permissions:
  contents: write
  id-token: write
  # `actions: write` needed so the post-publish step can dispatch
  # discord-release-notify.yml via `gh workflow run` — the `release: published`
  # event was supposed to fire it, but empirically doesn't (no `event: release`
  # rows ever appear in the notify workflow history, even for App-token releases).
  actions: write

# Serialize @next runs against @next runs, stable against stable — but allow @next and
# stable to run in parallel (they publish different versions and different tag names,
# so they don't collide). Prevents the "two @next dispatches compute the same counter,
# race the npm publish, second gets a 409" case.
concurrency:
  group: release-${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'next')) && 'next' || 'stable' }}
  cancel-in-progress: false

env:
  LIBRARY_PACKAGES: 'dynamic-forms dynamic-forms-material dynamic-forms-bootstrap dynamic-forms-ionic dynamic-forms-primeng dynamic-form-mcp openapi-generator'

jobs:
  # Push to release-* branches just surfaces this workflow in the PR checks — the actual
  # stable release is triggered manually via "Run workflow" after the PR is merged.
  await-dispatch:
    name: Awaiting manual trigger
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: |
          echo "ℹ️ Release workflow is ready."
          echo "To release, go to Actions → Release → Run workflow on this branch."
          echo "Select 'publish' mode to publish to npm."

  check-ci:
    name: Verify CI Passed
    # Only gates the stable dispatch paths. mode=next skips CI check — the @next gate
    # in the next-gate job doesn't need it, and scheduled runs don't hit this job at all.
    if: github.event_name == 'workflow_dispatch' && inputs.mode != 'next'
    runs-on: ubuntu-latest
    steps:
      - name: Check CI workflow status
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');

            console.log(`Checking CI status for branch: ${branch}`);

            // Get the latest CI workflow run for this branch
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'ci.yml',
              branch,
              per_page: 1
            });

            if (runs.data.workflow_runs.length === 0) {
              core.setFailed(`No CI workflow runs found for branch ${branch}. Push to the branch first to trigger CI.`);
              return;
            }

            const latestRun = runs.data.workflow_runs[0];
            console.log(`Latest CI run: ${latestRun.html_url}`);
            console.log(`Status: ${latestRun.status}, Conclusion: ${latestRun.conclusion}`);

            if (latestRun.status !== 'completed') {
              core.setFailed(`CI is still running. Wait for it to complete before releasing.`);
              return;
            }

            if (latestRun.conclusion !== 'success') {
              core.setFailed(`CI failed with conclusion: ${latestRun.conclusion}. Fix CI before releasing.`);
              return;
            }

            // Verify the CI run is for the same commit
            const currentSha = context.sha;
            if (latestRun.head_sha !== currentSha) {
              console.log(`Warning: CI ran on ${latestRun.head_sha}, current is ${currentSha}`);
              core.setFailed(`CI was run on a different commit. Push your changes and wait for CI to pass.`);
              return;
            }

            console.log('✅ CI passed for the current commit!');

  next-gate:
    name: Check for relevant changes (next)
    # Fires on scheduled cron OR on a manual `mode=next` dispatch (useful for on-demand
    # @next publishes without waiting for cron — e.g. to unblock a user or smoke-test).
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'next')
    runs-on: ubuntu-latest
    outputs:
      # Job output is the AND of "relevant commits exist" (gate) and "CI is green on
      # that commit" (ci-check). Either failing means we skip the @next publish.
      should_publish: ${{ steps.gate.outputs.should_publish == 'true' && steps.ci-check.outputs.ok != 'false' }}
      version: ${{ steps.gate.outputs.version }}
      sha: ${{ steps.gate.outputs.sha }}
      base: ${{ steps.gate.outputs.base }}
      # 'next' normally, 'rc' during an active RC cycle. Drives the npm dist-tag and the
      # git tag namespace (next/… vs rc/…) for the nightly publish.
      dist_tag: ${{ steps.gate.outputs.dist_tag }}
      tag_ns: ${{ steps.gate.outputs.tag_ns }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Detect relevant changes & compute version
        id: gate
        shell: bash
        env:
          # Explicit rc target from a `mode=next` dispatch; empty on scheduled runs.
          RC_TARGET_INPUT: ${{ inputs.target }}
        run: |
          set -euo pipefail

          # True stable only: `*-*` excludes every prerelease (-next, -nightly, -rc, …),
          # so an in-flight RC tag (v1.0.0-rc.1) is NOT mistaken for the last stable.
          LAST_STABLE=$(git describe --tags --abbrev=0 --match 'v[0-9]*' --exclude '*-*' 2>/dev/null || echo "")

          if [ -z "$LAST_STABLE" ]; then
            echo "::warning::No prior stable tag found — skipping next release"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # RC cycle = a prerelease CHANNEL off main, no release branch. It is "active"
          # either because this run explicitly bootstraps/re-targets it (mode=next with
          # target=X.Y.Z) or because a prior rc tag exists whose final vX.Y.Z hasn't
          # shipped — letting scheduled nightlies auto-continue rc.2, rc.3, … with no input.
          # All rc versions we've ever tagged (manual v…-rc.N OR nightly rc/…), normalized
          # to bare versions and version-sorted; the last is the most recent rc.
          LATEST_RC=$(git tag --list 'v[0-9]*-rc.*' 'rc/[0-9]*-rc.*' \
            | sed -e 's#^rc/##' -e 's#^v##' | sort -V | tail -1 || true)

          RC_TARGET=""
          if [ -n "${RC_TARGET_INPUT:-}" ]; then
            # Must be a bare M.m.p (no leading v, no suffix) — it becomes the rc base.
            # A bootstrap bypasses the commit gate and goes straight to publish, so reject
            # a typo here rather than failing opaquely later at `nx release version`.
            if ! [[ "$RC_TARGET_INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid rc target '$RC_TARGET_INPUT' — expected bare M.m.p (e.g. 1.0.0)"
              exit 1
            fi
            RC_TARGET="$RC_TARGET_INPUT"               # explicit bootstrap / re-target
          elif [ -n "$LATEST_RC" ]; then
            CAND=${LATEST_RC%%-rc.*}                    # 1.0.0-rc.2 -> 1.0.0
            if git rev-parse -q --verify "refs/tags/v${CAND}^{}" >/dev/null 2>&1; then
              echo "Final v${CAND} already tagged — RC cycle is closed"
            else
              RC_TARGET="$CAND"                         # auto-continue the open rc cycle
            fi
          fi

          if [ -n "$RC_TARGET" ]; then
            TARGET="$RC_TARGET"; LABEL="rc"; DIST_TAG="rc"; TAG_NS="rc"
          else
            LAST_VERSION=${LAST_STABLE#v}
            # @next always signals the upcoming minor, regardless of whether the next
            # stable ends up a patch or minor — keeps 0.10.0-next.1, 0.10.0-next.2, …
            # stable across a cycle; the base rolls forward when the real release ships.
            TARGET=$(node -e "const [M,m]='${LAST_VERSION}'.split('.').map(Number); console.log(\`\${M}.\${m+1}.0\`)")
            LABEL="next"; DIST_TAG="next"; TAG_NS="next"
          fi

          # Gate base: the most recent release marker of ANY kind reachable from HEAD —
          # last stable (vX.Y.Z), last RC (vX.Y.Z-rc.N or rc/…), or last nightly (next/…).
          # Tags are scanned newest-first; the first that is an ancestor of HEAD wins, so
          # the relevant-commit window below spans only what landed since the last release.
          # Replaces the prior commits-since-stable + SHA-idempotency checks: when nothing
          # relevant landed since the most recent release, RELEVANT=0 and we skip.
          BASE=""
          while read -r t; do
            [ -z "$t" ] && continue
            if git merge-base --is-ancestor "$t" HEAD 2>/dev/null; then BASE="$t"; break; fi
          done < <(git for-each-ref --sort=-creatordate --format='%(refname:short)' \
                     'refs/tags/v[0-9]*' 'refs/tags/next/*' 'refs/tags/rc/*')
          [ -z "$BASE" ] && BASE="$LAST_STABLE"

          echo "Last stable: ${LAST_STABLE:-none}; latest rc: ${LATEST_RC:-none}; target: ${TARGET}-${LABEL} (dist-tag: ${DIST_TAG}); gate base: $BASE"

          # Bump-worthy commit types per nx.json release.conventionalCommits:
          # feat, fix, perf, revert. Everything else (docs/ci/chore/test/build/style/refactor)
          # is classified semverBump:none and should not trigger a next release.
          #
          # Path filter `-- packages/` further restricts to commits that actually touched
          # the published library sources. A `feat(docs): …` or `fix(examples): …` no
          # longer triggers a nightly because it doesn't change anything that ships to
          # npm. Only changes under `packages/**` (the seven workspaces in
          # LIBRARY_PACKAGES) qualify.
          #
          # Disable errexit + pipefail for this pipeline so we can distinguish grep's
          # "no matches" (exit 1, fine) from a real grep error (exit ≥2, fail loud).
          # `set -e` alone would kill the script on grep's exit-1 BEFORE GREP_EXIT is
          # captured, turning every "nothing to release" cron into a workflow failure.
          set +e +o pipefail
          RELEVANT=$(git log "${BASE}..HEAD" --pretty=format:'%s' -- packages/ \
            | grep -cE '^(feat|fix|perf|revert)(\([^)]+\))?!?: ')
          GREP_EXIT=$?
          set -e -o pipefail
          if [ "$GREP_EXIT" -gt 1 ]; then
            echo "::error::grep failed unexpectedly (exit $GREP_EXIT)"
            exit 1
          fi

          echo "Bump-worthy commits touching packages/ since $BASE: $RELEVANT"

          # An explicit rc bootstrap (mode=next + target=…) publishes rc.1 on demand even
          # with no new commits — the human decision to enter the rc channel is the trigger.
          # Auto-continue crons (no input) still require bump-worthy commits, so an idle
          # rc cycle doesn't churn out empty rc.N every night.
          if [ "$RELEVANT" -eq 0 ] && [ -z "${RC_TARGET_INPUT:-}" ]; then
            echo "No bump-worthy commits since last release — skipping next release"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Capture the SHA NOW so the release job uses the same commit — no race
          # against in-flight commits between gate and release. (The counter-based
          # version doesn't embed the SHA, so pinning the ref is our only defense.)
          FULL_SHA=$(git rev-parse HEAD)

          # Monotonic counter per (target, label): TARGET.0-next.N normally, or
          # TARGET-rc.N during an active RC cycle (where TARGET already carries the rc's
          # M.m.p, e.g. 1.0.0). The bootstrap run finds no rc on npm yet → rc.1; every
          # nightly after reads the published rc.N and continues rc.{N+1}.
          # Query *every* library package and take the max — if one package failed to
          # publish on a prior run the others advanced, and we must not collide with the
          # highest existing counter anywhere. Commit traceability stays recoverable via
          # the publish timestamp + the npm provenance attestation (records exact SHA).
          # We MUST succeed at every package lookup — fail loud rather than default to
          # counter=1, which could clobber a real previous publish on a transient error.
          MAX_COUNTER=0
          for pkg in ${{ env.LIBRARY_PACKAGES }}; do
            if ! VERSIONS_JSON=$(npm view "@ng-forge/${pkg}" versions --json); then
              echo "::error::npm registry lookup failed for @ng-forge/${pkg}"
              exit 1
            fi
            # Regex-escape the base via env var inside Node — avoids leaving
            # literal dots as wildcards in the pattern (1x0x0 would otherwise match).
            PKG_MAX=$(echo "$VERSIONS_JSON" \
              | TARGET="$TARGET" LABEL="$LABEL" node -e "
                const v=JSON.parse(require('fs').readFileSync(0,'utf8'));
                const base=process.env.TARGET.replace(/\\./g, '\\\\.');
                const re=new RegExp('^'+base+'-'+process.env.LABEL+'\\\\.(\\\\d+)\$');
                const nums=(Array.isArray(v)?v:[v]).map(x=>{const m=re.exec(x);return m?+m[1]:-1}).filter(n=>n>=0);
                console.log(nums.length?Math.max(...nums):0);
              ")
            if [ "$PKG_MAX" -gt "$MAX_COUNTER" ]; then
              MAX_COUNTER=$PKG_MAX
            fi
          done
          COUNTER=$((MAX_COUNTER + 1))
          NEXT_VERSION="${TARGET}-${LABEL}.${COUNTER}"

          echo "Proposed next version: $NEXT_VERSION (dist-tag: $DIST_TAG)"

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${FULL_SHA}" >> "$GITHUB_OUTPUT"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "dist_tag=${DIST_TAG}" >> "$GITHUB_OUTPUT"
          echo "tag_ns=${TAG_NS}" >> "$GITHUB_OUTPUT"

      - name: Verify CI passed on the candidate commit
        # Skip @next publishes when main's CI is red. The stable path already has this
        # via the check-ci job; mirroring it here prevents a scheduled cron from
        # smoke-testing broken code under the @next dist-tag.
        # Sets ci-check.outputs.ok to 'false' on miss; the job's should_publish output
        # ANDs that in. Uses `core.warning` (not setFailed) so the STEP succeeds and
        # the output is actually emitted.
        if: steps.gate.outputs.should_publish == 'true'
        id: ci-check
        uses: actions/github-script@v9
        with:
          script: |
            // Fail-safe default: if anything below throws before we explicitly flip this
            // to 'true', the job's should_publish output ANDs in 'false' and we skip.
            // Without this, an unhandled exception (API outage, schema change) leaves
            // `ok` unset — and `undefined != 'false'` evaluates TRUE, publishing despite
            // a failed CI check.
            core.setOutput('ok', 'false');
            const sha = '${{ steps.gate.outputs.sha }}';
            const { owner, repo } = context.repo;
            const runs = await github.rest.actions.listWorkflowRuns({
              owner, repo, workflow_id: 'ci.yml', head_sha: sha, per_page: 1
            });
            const run = runs.data.workflow_runs[0];
            if (!run) {
              core.warning(`No CI run found for ${sha} — skipping @next publish`);
              return;
            }
            if (run.status !== 'completed') {
              core.warning(`CI for ${sha} still ${run.status} — skipping @next publish`);
              return;
            }
            if (run.conclusion !== 'success') {
              core.warning(`CI for ${sha} concluded ${run.conclusion} — skipping @next publish`);
              return;
            }
            console.log(`✅ CI for ${sha} passed — proceeding with @next publish`);
            core.setOutput('ok', 'true');

  release:
    name: Release Libraries
    runs-on: ubuntu-latest
    needs: [check-ci, next-gate]
    # `always()` is load-bearing: one of check-ci / next-gate is always skipped per run
    # (they gate on mutually exclusive conditions). Without `always()`, `needs:` would
    # short-circuit whenever either isn't successful.
    # Gating:
    #   - push             → never runs (release-* placeholder only)
    #   - dispatch+publish → check-ci must pass (mode=dry-run also hits this branch)
    #   - dispatch+dry-run → check-ci must pass
    #   - dispatch+next    → next-gate must decide to publish
    #   - schedule         → next-gate must decide to publish
    if: |
      always() &&
      github.event_name != 'push' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.mode != 'next' && needs.check-ci.result == 'success') ||
        ((github.event_name == 'schedule' || inputs.mode == 'next') && needs.next-gate.outputs.should_publish == 'true')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Pin to an immutable SHA so a commit landing between gate/check-ci and release
          # can't be silently published:
          #   - @next path: gate's captured SHA (main tip at gate time)
          #   - stable dispatch: github.sha (the workflow event's immutable commit)
          # Do NOT fall back to github.ref — it resolves to the branch TIP at checkout
          # time, which races in-flight commits and could publish unvalidated code.
          ref: ${{ needs.next-gate.outputs.sha || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version + dist-tag
        id: resolve
        env:
          GATE_VERSION: ${{ needs.next-gate.outputs.version }}
          GATE_DIST_TAG: ${{ needs.next-gate.outputs.dist_tag }}
          GATE_TAG_NS: ${{ needs.next-gate.outputs.tag_ns }}
          # Single source of truth for "are we on the @next path?"
          IS_NEXT_PATH: ${{ github.event_name == 'schedule' || inputs.mode == 'next' }}
        run: |
          if [ "$IS_NEXT_PATH" = "true" ]; then
            VERSION="$GATE_VERSION"
            DIST_TAG="$GATE_DIST_TAG"          # 'next', or 'rc' during an active RC cycle
            PRERELEASE=true
            RELEASE_TAG="${GATE_TAG_NS}/${VERSION}"   # next/… or rc/…
          else
            # Stable dispatch (dry-run or publish): sources were already bumped by /release PR.
            # A prerelease version (e.g. 1.0.0-rc.1) must NOT land on @latest — route rc
            # versions to @rc, any other prerelease id to @next, and flag the GitHub
            # release as a prerelease. Only a clean M.m.p goes to @latest.
            VERSION=$(node -p "require('./packages/dynamic-forms/package.json').version")
            case "$VERSION" in
              *-rc.*) DIST_TAG="rc";     PRERELEASE=true  ;;
              *-*)    DIST_TAG="next";   PRERELEASE=true  ;;
              *)      DIST_TAG="latest"; PRERELEASE=false ;;
            esac
            RELEASE_TAG="v${VERSION}"
          fi
          # GitHub release title by channel: rc reads "Release candidate", @next stays
          # "Nightly", stable is "Release".
          case "$DIST_TAG" in
            rc)   RELEASE_NAME="Release candidate v${VERSION}" ;;
            next) RELEASE_NAME="Nightly v${VERSION}" ;;
            *)    RELEASE_NAME="Release v${VERSION}" ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "DIST_TAG=$DIST_TAG" >> "$GITHUB_ENV"
          echo "PRERELEASE=$PRERELEASE" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$RELEASE_NAME" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Releasing $VERSION (dist-tag: $DIST_TAG, prerelease: $PRERELEASE, tag: $RELEASE_TAG)"

      - name: Generate GitHub App Token
        # Generated up-front so the job fails before any irreversible action if App config
        # is broken (missing/expired secret, App uninstalled, GH outage). Earlier placement
        # after npm publish let broken-token runs ship to npm but skip the tag-write below,
        # leaving the gate stuck on a stale BASE and re-publishing every night.
        # GITHUB_TOKEN cannot trigger downstream workflows (GitHub recursion safeguard), so
        # releases created with it don't fire `release: published` — which is what
        # discord-release-notify.yml listens for. App-scoped tokens propagate normally.
        # The 1-hour token lifetime comfortably covers build (~3 min) + npm publish (~2 min).
        # Gated to the same paths that consume it so a dry-run doesn't depend on App secrets.
        # The two action-gh-release steps below are mutually exclusive (publish vs
        # schedule|next), so a single shared token is sufficient.
        if: inputs.mode == 'publish' || github.event_name == 'schedule' || inputs.mode == 'next'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Build libraries
        # Build BEFORE bumping. Some packages (e.g. openapi-generator) declare
        # `manifestRootsToUpdate: ['{projectRoot}', 'dist/{projectRoot}']`, so
        # `nx release version` below needs `dist/.../package.json` to exist first.
        # For stable dispatch this builds the source already-bumped by /release.
        # For the @next path this builds unbumped sources; the next step rewrites both
        # source and dist package.jsons to the @next version.
        # Assumes the build doesn't embed `package.json`'s `version` string into emitted
        # JS (true for ng-packagr: version is only set on the dist manifest, not in code).
        # If any source ever starts doing `import pkg from './package.json'` and exposes
        # `pkg.version`, the dist would carry the unbumped value and the order needs to flip.
        run: pnpm nx run-many -t build -p ${{ env.LIBRARY_PACKAGES }}

      - name: Verify build outputs
        run: |
          echo "Verifying build outputs..."
          for pkg in ${{ env.LIBRARY_PACKAGES }}; do
            if [ ! -d "dist/packages/$pkg" ]; then
              echo "❌ Build output missing for $pkg"
              exit 1
            fi
            echo "✅ $pkg"
          done

      - name: Bump source + dist versions (@next path)
        if: github.event_name == 'schedule' || inputs.mode == 'next'
        # Two ephemeral mutations to nx.json (the runner discards its checkout
        # after the job, so on-disk nx.json is never affected):
        #   1. Strip preVersionCommand — `nx release version` would otherwise
        #      rebuild; we already built above.
        #   2. Disable preserveMatchingDependencyRanges — it defaults to true,
        #      which makes nx bail when the new version (e.g. prerelease
        #      `0.8.0-next.X`) sits outside the existing peer-dep range
        #      (`~0.7.0`). Disabling it lets nx rewrite the range to point at
        #      the @next version, which is what we want for cross-package
        #      installs of `@next`.
        env:
          NEW_VERSION: ${{ needs.next-gate.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('nx.json', 'utf8'));
            cfg.release ??= {};
            cfg.release.version ??= {};
            delete cfg.release.version.preVersionCommand;
            cfg.release.version.preserveMatchingDependencyRanges = false;
            fs.writeFileSync('nx.json', JSON.stringify(cfg, null, 2));
          "
          pnpm nx release version "$NEW_VERSION" \
            --git-commit=false --git-tag=false --stage-changes=false

      - name: Generate Changelog
        if: inputs.mode == 'publish'
        # Changelog lives in a local file; writing it has no side effect outside the
        # runner, so ordering before publish is fine. Earlier placement also means
        # `RELEASE_NOTES.md` is ready when the GitHub Release step runs below.
        run: |
          # `*-*` excludes every prerelease (matches the gate's LAST_STABLE), so a stable
          # changelog spans since the last STABLE — never truncated to since-last-rc even
          # if a v…-rc.… tag was ever cut via the prerelease safety-net path.
          PREV_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' --exclude '*-*' 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -50)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          cat > RELEASE_NOTES.md <<EOF
          ## What's Changed

          ${CHANGELOG}

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-initial}...v${{ env.VERSION }}
          EOF

      - name: Publish to npm (dry-run)
        if: inputs.mode == 'dry-run'
        run: pnpm nx release publish --access public --dry-run

      - name: Publish to npm
        # Real publish: workflow_dispatch mode=publish, workflow_dispatch mode=next, or schedule.
        # Runs BEFORE the GitHub release/prerelease steps so that the
        # irreversible-first-so-reversible-second pattern holds: if npm fails, no
        # stale tag/release is left behind. On re-run after a partial failure, the
        # per-package `npm view` check below skips packages already on npm so we don't 409.
        if: |
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && (inputs.mode == 'publish' || inputs.mode == 'next'))
        run: |
          echo "Publishing with dist-tag: $DIST_TAG"
          for pkg in ${{ env.LIBRARY_PACKAGES }}; do
            # Idempotency: skip if this exact version is already on npm (previous run
            # may have published some packages before dying mid-loop).
            if npm view "@ng-forge/${pkg}@${VERSION}" version >/dev/null 2>&1; then
              echo "@ng-forge/${pkg}@${VERSION} already published — skipping"
              continue
            fi
            npm publish "dist/packages/$pkg" --access public --provenance --tag "$DIST_TAG"
          done

      - name: Create GitHub Release
        # action-gh-release creates the v${VERSION} tag at github.sha via the GitHub API
        # AND publishes the release in one step. Runs AFTER npm publish so a failed publish
        # doesn't leave a stale tag/release behind. Idempotent on retry: if the release
        # already exists, the action updates it. Manual recovery: re-dispatch mode=publish.
        # `id` is consumed by the Notify Discord step below to gate on actual success.
        id: gh-release
        if: inputs.mode == 'publish'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          name: Release v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ env.PRERELEASE }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Generate Nightly Release Notes
        # Body for the @next GitHub prerelease. Reuses the gate's BASE (most recent of
        # last stable / last nightly) so the changelog spans only commits added since
        # the previous release of any kind — no duplicated detection logic.
        if: github.event_name == 'schedule' || inputs.mode == 'next'
        env:
          NEXT_SHA: ${{ needs.next-gate.outputs.sha }}
          BASE: ${{ needs.next-gate.outputs.base }}
        run: |
          set -euo pipefail

          CHANGELOG=$(git log "${BASE}..${NEXT_SHA}" --pretty=format:"- %s (%h)" --no-merges)

          cat > NEXT_RELEASE_NOTES.md <<EOF
          Nightly @${DIST_TAG} prerelease — published from \`main\`.

          ## Changes since ${BASE}

          ${CHANGELOG:-_No new commits._}
          EOF

      - name: Create GitHub Prerelease (@next)
        # Replaces the prior manual `git tag` step. action-gh-release creates the
        # `next/<version>` (or `rc/<version>` during an RC cycle) tag at the gate SHA via
        # the GitHub API — the same kind of marker next-gate's BASE scan looks up, so
        # re-runs on the same commit still become no-ops.
        # Tag-after-publish (not before): if this fails, worst case is one duplicate
        # publish on the next run — strictly better than the tag-first failure mode where
        # a phantom tag could permanently block future publishes.
        # continue-on-error: makes the job succeed even if release creation flakes — npm
        # is already published and rolling back that is worse than a missing GH release.
        # The Notify Discord step below uses `steps.gh-prerelease.outcome` (not job
        # conclusion) to detect the flake and skip Discord — `outcome` is the value
        # BEFORE continue-on-error is applied, so a failed creation still reads as
        # 'failure' here even though the job succeeds overall.
        # Idempotent on retry: if the release already exists, action-gh-release updates it.
        id: gh-prerelease
        if: github.event_name == 'schedule' || inputs.mode == 'next'
        continue-on-error: true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ needs.next-gate.outputs.sha }}
          name: ${{ env.RELEASE_NAME }}
          body_path: NEXT_RELEASE_NOTES.md
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Notify Discord
        # Dispatches discord-release-notify.yml's workflow_dispatch trigger with
        # the just-published tag. Decouples the notify path from `release: published`
        # event propagation, which doesn't fire reliably for App-token releases here.
        # continue-on-error: notifications are best-effort — npm+GH release already
        # succeeded, so a Discord hiccup must not fail the run.
        # Gated on the matching gh-* step's outcome so a flaky release-creation
        # doesn't ping Discord about a non-existent tag. The two creation steps are
        # mutually exclusive (publish vs schedule|next), so exactly one outcome will
        # be 'success' on a valid run; the other will be 'skipped'. Dry-run skips
        # both, so neither outcome fires.
        if: |
          steps.gh-release.outcome == 'success' ||
          steps.gh-prerelease.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # RELEASE_TAG already carries the correct namespace for every path:
          # v<ver> (stable + rc cut), next/<ver> (nightly), rc/<ver> (rc nightly).
          echo "Dispatching discord-release-notify.yml for tag: $RELEASE_TAG"
          gh workflow run discord-release-notify.yml -f tag="$RELEASE_TAG"

      - name: Summary
        run: |
          {
            echo "## Release v${{ env.VERSION }}"
            echo ""
            echo "### Published packages (dist-tag: \`$DIST_TAG\`):"
            for pkg in ${{ env.LIBRARY_PACKAGES }}; do
              echo "- \`@ng-forge/$pkg@${{ env.VERSION }}\`"
            done
            echo ""
            if [ "${{ inputs.mode }}" = "publish" ]; then
              echo "### Links:"
              echo "- [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/v${{ env.VERSION }})"
              echo "- [npm](https://www.npmjs.com/package/@ng-forge/dynamic-forms/v/${{ env.VERSION }})"
            else
              echo "### npm"
              echo "- [npm](https://www.npmjs.com/package/@ng-forge/dynamic-forms/v/${{ env.VERSION }})"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
