<div class="integration-view">
  <section class="integration-view__install">
    <h2 class="integration-view__heading">Installation</h2>
    <docs-install-command [packages]="data().packages" />
  </section>

  @if (data().stylesCode) {
    <section class="integration-view__setup">
      <h2 class="integration-view__heading">Styles</h2>
      <ng-doc-code [copyButton]="true">
        <div [codeHighlight]="data().stylesCode!" lang="scss"></div>
      </ng-doc-code>
    </section>
  }

  <section class="integration-view__setup">
    <h2 class="integration-view__heading">Setup</h2>
    <ng-doc-code [copyButton]="true">
      <div [codeHighlight]="data().setupCode"></div>
    </ng-doc-code>
  </section>

  <section class="integration-view__features">
    <h2 class="integration-view__heading">Key Props</h2>
    <ul class="integration-view__features-list">
      @for (feature of data().features; track feature.name) {
        <li class="integration-view__feature">
          <code class="integration-view__feature-name">{{ feature.name }}</code>
          <span class="integration-view__feature-desc">{{ feature.description }}</span>
        </li>
      }
    </ul>
  </section>
</div>
