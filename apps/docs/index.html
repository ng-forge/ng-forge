<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ng-forge - Dynamic Forms for Angular</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="ng-forge provides a configuration-driven dynamic forms library for Angular. Build complex, signal forms with minimal code using JSON/TypeScript configurations. Supports Material, PrimeNG, Ionic, and Bootstrap."
    />
    <meta
      name="keywords"
      content="angular dynamic forms, signal forms angular, json forms angular, formly alternative, ngx-formly alternative, angular forms library, angular form builder, configuration driven forms, json schema forms, angular signals forms, reactive forms signals, signal-based forms, Angular Material, PrimeNG, Ionic, Bootstrap, TypeScript"
    />
    <meta name="author" content="ng-forge" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ng-forge.com/dynamic-forms/" />
    <meta property="og:title" content="ng-forge - Dynamic Forms for Angular" />
    <meta
      property="og:description"
      content="Forms are boring. Your code shouldn't be. Write the config, we handle the rest. Type-safe, signal-native, zero boilerplate Angular forms."
    />
    <meta property="og:site_name" content="ng-forge" />
    <meta property="og:image" content="https://ng-forge.com/dynamic-forms/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="twitter:domain" content="ng-forge.com" />
    <meta name="twitter:url" content="https://ng-forge.com/dynamic-forms/" />
    <meta name="twitter:title" content="ng-forge - Dynamic Forms for Angular" />
    <meta
      name="twitter:description"
      content="Forms are boring. Your code shouldn't be. Write the config, we handle the rest. Type-safe, signal-native, zero boilerplate Angular forms."
    />
    <meta name="twitter:image" content="https://ng-forge.com/dynamic-forms/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://ng-forge.com/dynamic-forms/" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Apply saved theme before first paint to prevent FOUC (white → dark flash) -->
    <script>
      (function () {
        var t = localStorage.getItem('ng-forge-docs-theme');
        if (t === 'dark' || t === 'auto') {
          document.documentElement.setAttribute('data-theme', t);
        } else if (!t) {
          document.documentElement.setAttribute('data-theme', 'auto');
        }
      })();
    </script>

    <!-- Critical inline styles to prevent FOUC -->
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }
      /* Dark mode: critical CSS custom properties + styles to prevent white flash.
         These mirror the --forge-* values from styles.scss which loads asynchronously in dev mode.
         Design tokens: $bg-deep=#0a0908, $bg-surface=#131210, $bg-elevated=#1a1916,
         $steel=#e8e4de, $steel-mid=#9a958c, $steel-dark=#2a2824, $steel-dim=#5c5850 */
      [data-theme='dark'] {
        --forge-base-0: #0a0908;
        --forge-base-1: #131210;
        --forge-base-2: #1a1916;
        --forge-base-3: #2a2824;
        --forge-base-4: #5c5850;
        --forge-text: #e8e4de;
        --forge-text-muted: #9a958c;
        --forge-border-color: #2a2824;
        --forge-navbar-bg: #0a0908;
        --forge-sidebar-bg: #0a0908;
        --forge-code-bg: #131210;
        background: #0a0908;
        color: #e8e4de;
      }
      [data-theme='dark'] body {
        background: #0a0908;
        color: #e8e4de;
      }
      @media (prefers-color-scheme: dark) {
        [data-theme='auto'] {
          --forge-base-0: #0a0908;
          --forge-base-1: #131210;
          --forge-base-2: #1a1916;
          --forge-base-3: #2a2824;
          --forge-base-4: #5c5850;
          --forge-text: #e8e4de;
          --forge-text-muted: #9a958c;
          --forge-border-color: #2a2824;
          --forge-navbar-bg: #0a0908;
          --forge-sidebar-bg: #0a0908;
          --forge-code-bg: #131210;
          background: #0a0908;
          color: #e8e4de;
        }
        [data-theme='auto'] body {
          background: #0a0908;
          color: #e8e4de;
        }
      }
      html:has(app-landing),
      html:has(app-landing) body {
        background: #000000;
      }
    </style>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareSourceCode",
        "name": "ng-forge",
        "description": "A configuration-driven dynamic forms library for Angular. Build complex, signal forms with minimal code.",
        "url": "https://ng-forge.com/dynamic-forms/",
        "codeRepository": "https://github.com/ng-forge/ng-forge",
        "programmingLanguage": {
          "@type": "ComputerLanguage",
          "name": "TypeScript"
        },
        "runtimePlatform": "Angular",
        "license": "https://opensource.org/licenses/MIT",
        "author": {
          "@type": "Organization",
          "name": "ng-forge",
          "url": "https://github.com/ng-forge"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <!-- Documentation Breadcrumb Structure -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ng-forge Documentation",
        "url": "https://ng-forge.com/dynamic-forms/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://ng-forge.com/dynamic-forms/?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <app-root></app-root>
    <script type="module" src="/apps/docs/src/main.ts"></script>
  </body>
</html>
