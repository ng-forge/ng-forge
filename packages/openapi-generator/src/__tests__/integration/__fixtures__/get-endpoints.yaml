openapi: '3.0.3'
info:
  title: Test
  version: '1.0.0'
paths:
  /settings:
    get:
      operationId: getSettings
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  theme:
                    type: string
                  language:
                    type: string
                    enum: [en, fr, de]
                  notifications:
                    type: boolean
  /items:
    get:
      operationId: listItems
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
